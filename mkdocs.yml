# 离线HTML构建说明 (Offline HTML Build Instructions)
# 需求 11.2, 11.3, 11.4, 11.5
# 
# 构建离线HTML包的步骤：
# 1. 运行构建命令: mkdocs build
# 2. 生成的site/目录包含完整的静态HTML文件
# 3. 所有资源（CSS、JS、图片）使用相对路径，支持离线访问
# 4. 搜索功能通过预构建索引支持离线使用
# 5. 导航和内部链接在离线环境下正常工作
#
# 配置要点：
# - use_directory_urls: false - 使用.html文件扩展名，确保离线链接有效
# - prebuild_index: true - 预构建搜索索引，无需服务器端处理
# - 所有extra_css和extra_javascript使用相对路径
# - Material主题自动处理资源的相对路径引用
#
# 打包离线版本：
# - 将整个site/目录压缩为ZIP文件
# - 用户解压后可直接在浏览器中打开index.html
# - 所有功能（导航、搜索、代码高亮）在离线环境下正常工作

