site_name: 医疗器械嵌入式软件知识体系
site_description: 全面的医疗器械嵌入式软件开发知识库
site_author: 知识体系团队
site_url: https://x-gen-lab.github.io/medical-embedded-knowledge/

# 离线HTML构建配置 (Offline HTML Build Configuration)
# 需求 11.2: 支持将整个知识库打包为离线HTML文件
use_directory_urls: false  # 使用文件名而非目录URL，确保离线访问时链接正常工作

theme:
  name: material
  language: zh
  custom_dir: docs/overrides  # 使用自定义模板目录
  features:
    # 导航特性 (Navigation Features)
    - navigation.tabs           # 启用顶部标签式导航
    - navigation.sections       # 启用导航分组
    - navigation.expand         # 默认展开所有导航项
    - navigation.top            # 返回顶部按钮
    - navigation.indexes        # 启用章节索引页
    - navigation.tracking       # 地址栏自动更新为当前标题
    # 搜索特性 (Search Features) - 需求 6.1, 6.2, 6.5
    - search.suggest            # 搜索建议（输入时显示建议）
    - search.highlight          # 搜索结果高亮显示
    - search.share              # 搜索结果分享
    # 内容特性 (Content Features)
    - content.code.copy
    - content.tabs.link
    - content.code.annotate     # 代码注释
    # 目录特性 (TOC Features)
    - toc.follow                # 目录跟随滚动
    - toc.integrate             # 将目录集成到左侧导航
  palette:
    - scheme: default
      primary: blue
      accent: light-blue
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - scheme: slate
      primary: blue
      accent: light-blue
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式

plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\-\.]+'           # 分词分隔符（空格、连字符、点）
      # 离线搜索配置 (Offline Search Configuration) - 需求 11.2, 11.3
      # 注意: prebuild_index 和 indexing 选项在新版本中已不支持，搜索功能仍然正常工作
  # PDF导出插件 (PDF Export Plugin) - 任务 11 已完成
  # 注意: 在Windows环境下可能需要额外的依赖，如果构建失败可以临时禁用
  # - pdf-export:
  #     combined: true                   # 生成合并的完整PDF
  #     combined_output_path: pdf/medical-embedded-knowledge-complete.pdf  # 完整PDF输出路径
  #     media_type: print                # 使用打印媒体类型
  #     enabled_if_env: ENABLE_PDF_EXPORT  # 通过环境变量控制是否启用
  #     verbose: true                    # 详细输出
  #     debug_html: false                # 调试HTML（生产环境关闭）
  - i18n:
      docs_structure: folder           # 使用文件夹结构组织多语言内容
      fallback_to_default: true        # 如果翻译不存在，回退到默认语言
      reconfigure_material: true       # 自动重新配置Material主题
      reconfigure_search: true         # 自动重新配置搜索插件
      languages:
        - locale: zh
          default: true                # 中文为默认语言
          name: 中文
          build: true
          site_name: 医疗器械嵌入式软件知识体系
        - locale: en
          name: English
          build: true
          site_name: Medical Device Embedded Software Knowledge System
          nav_translations:
