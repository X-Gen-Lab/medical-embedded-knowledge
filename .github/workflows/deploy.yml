name: Deploy to GitHub Pages

# 自动构建触发条件 (Automatic Build Triggers)
on:
  # 当推送到main分支时触发部署 (Trigger on push to main branch)
  push:
    branches:
      - main
    # 只在文档相关文件变更时触发，提高效率 (Only trigger on documentation changes)
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '.github/workflows/deploy.yml'
  
  # 允许手动触发部署 (Allow manual workflow dispatch)
  workflow_dispatch:

# 设置权限以允许部署到GitHub Pages (Set permissions for GitHub Pages deployment)
permissions:
  contents: read
  pages: write
  id-token: write

# 确保同一时间只有一个部署在运行 (Ensure only one deployment runs at a time)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建作业 (Build Job)
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 检出代码 (Checkout code)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，用于git-revision-date插件
      
      # 设置Python环境 (Set up Python environment)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # 缓存pip依赖以加快构建速度
      
      # 安装依赖 (Install dependencies)
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      # 配置Git用户信息（git-revision-date插件需要）
      # Configure Git user info (required by git-revision-date plugin)
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
      
      # 构建MkDocs站点 (Build MkDocs site)
      - name: Build MkDocs site
        run: |
          mkdocs build --strict --verbose
        env:
          # 禁用PDF导出以加快构建速度（如需PDF可启用）
          # Disable PDF export for faster builds (enable if PDF needed)
          ENABLE_PDF_EXPORT: false
      
      # 创建离线版本标识文件 (Create offline version marker)
      - name: Add offline version marker
        run: |
          echo "# 离线版本信息" > site/OFFLINE_BUILD.html
          echo "<p>构建时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')</p>" >> site/OFFLINE_BUILD.html
          echo "<p>版本: $(git rev-parse --short HEAD)</p>" >> site/OFFLINE_BUILD.html
          echo "<p>分支: $(git rev-parse --abbrev-ref HEAD)</p>" >> site/OFFLINE_BUILD.html
      
      # 上传构建产物 (Upload build artifacts)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  # 部署作业 (Deploy Job)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      # 部署到GitHub Pages (Deploy to GitHub Pages)
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      # 输出部署信息 (Output deployment info)
      - name: Display deployment info
        run: |
          echo "✅ 部署成功！"
          echo "🌐 站点URL: ${{ steps.deployment.outputs.page_url }}"
          echo "📦 部署时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
