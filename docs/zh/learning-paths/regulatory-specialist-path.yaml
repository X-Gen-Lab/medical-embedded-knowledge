  - type: "standard"
    title: "ISO 13485:2016 医疗器械质量管理体系"
    url: "https://www.iso.org/standard/59752.html"
    
  - type: "standard"
    title: "ISO 14971:2019 医疗器械风险管理"
    url: "https://www.iso.org/standard/72704.html"
    
  - type: "standard"
    title: "IEC 60601-1:2005+AMD1:2012+AMD2:2020"
    url: "https://www.iec.ch/standards"
    
  - type: "book"
    title: "医疗器械法规事务实用指南"
